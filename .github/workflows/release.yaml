name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      python-version:
        description: 'Python version(s) to test against as a comma-separated string.'
        required: false
        type: string
        default: '3.12'
      requirements:
        description: 'Path to a requirements.txt file to install before running tests. Leave empty (default) to install from pyproject.toml test dependencies.'
        required: false
        type: string
        default: ''

# Reusable workflows inherit the caller's top-level permissions (job-level
# permissions cannot be set on jobs that use `uses:`). Grant the union of all
# permissions required by the called workflows:
#   release.yaml — contents: write (push commits/tags, create releases)
#   publish.yaml — contents: write (upload release assets)
#                  id-token: write + attestations: write (build provenance)

# Default to least-privileged permissions; individual jobs override as needed.
permissions:
  contents: read

env:
  PYTHON_VERSION: ${{ inputs.python-version || '3.12' }} # override via python-version input
  REQUIREMENTS: ${{ inputs.requirements || '' }} # override via requirements input

jobs:
  configure:
    name: Normalize Inputs
    runs-on: ubuntu-latest
    outputs:
      python-version: ${{ steps.setup.outputs.python-version }}
      requirements: ${{ steps.setup.outputs.requirements }}
    steps:
      - name: Setup
        id: setup
        uses: stairwaytowonderland/python-reusable-workflows/.github/actions/setup-variables@main
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          requirements: ${{ env.REQUIREMENTS }}

  test:
    name: Test
    needs: [configure]
    uses: ./.github/workflows/test.yaml
    permissions:
      contents: read
    with:
      python-version: ${{ needs.configure.outputs.python-version }}
      requirements: ${{ needs.configure.outputs.requirements }}

  release:
    name: Release
    needs: [test]
    uses: stairwaytowonderland/python-reusable-workflows/.github/workflows/release.yaml@main
    permissions:
      contents: write # push commits/tags, create GitHub Releases
    secrets: inherit

  publish:
    name: Dispatch publish workflow
    runs-on: ubuntu-latest
    needs: [configure, release]
    if: needs.release.outputs.released == 'true'

    permissions:
      actions: write # trigger workflow_dispatch on publish.yaml

    steps:
      - name: Action | Dispatch publish workflow
        uses: stairwaytowonderland/python-reusable-workflows/.github/actions/dispatch@main
        with:
          workflow: publish.yaml
          tag: ${{ needs.release.outputs.tag }}
          provenance: true
          python-version: ${{ needs.configure.outputs.python-version }}
          requirements: ${{ needs.configure.outputs.requirements }}

  # -------------------------------------------------------------------------- #
  # Publish                                                                    #
  # Runs the reusable publish workflow, chained from the release outputs.      #
  # Only runs when a new version was actually released.                        #
  # -------------------------------------------------------------------------- #
  # publish:
  #   name: Publish
  #   needs: [configure, release]
  #   if: needs.release.outputs.released == 'true'
  #   uses: stairwaytowonderland/python-reusable-workflows/.github/workflows/publish.yaml@main
  #   permissions:
  #     contents: write # upload release assets
  #     id-token: write # OIDC token for attestations (if provenance enabled)
  #     attestations: write # build provenance attestations (if enabled)
  #   with:
  #     tag: ${{ needs.release.outputs.tag }}
  #     python-version: ${{ needs.configure.outputs.python-version }}
  #     requirements: ${{ needs.configure.outputs.requirements }}
