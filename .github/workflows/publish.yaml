name: Publish

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build and publish (e.g. v1.2.3)'
        required: true
        type: string
      provenance:
        description: 'Whether to generate a SLSA build provenance attestation.'
        required: false
        default: 'false'
      python-version:
        description: 'Python version to use for building and publishing'
        required: false
        type: string
        default: '3.12'
      requirements:
        description: 'Path to a requirements.txt file to install before building (e.g. requirements.txt). Leave empty (default) to use Poetry instead.'
        required: false
        type: string
        default: ''

# Default to least-privileged permissions; individual jobs override as needed.
permissions:
  contents: read

env:
  DEFAULT_PYTHON_VERSION: '3.12' # override via python-version input
  REQUIREMENTS: '' # override via requirements input

jobs:
  configure:
    name: Normalize Inputs
    runs-on: ubuntu-latest
    outputs:
      python-version: ${{ steps.setup.outputs.python-version }}
      requirements: ${{ steps.setup.outputs.requirements }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Python Variables
        id: setup
        uses: ./.github/actions/setup
        with:
          python-version: ${{ github.event.inputs.python-version || env.DEFAULT_PYTHON_VERSION }}
          requirements: ${{ github.event.inputs.requirements || env.REQUIREMENTS }}

  publish:
    name: Publish
    uses: stairwaytowonderland/python-reusable-workflows/.github/workflows/publish.yaml@main
    needs: [configure]
    permissions:
      contents: write # upload release assets
      id-token: write # OIDC token for attestations (if provenance enabled)
      attestations: write # build provenance attestations (if enabled)
    with:
      tag: ${{ github.event.inputs.tag || github.ref }}
      python-version: ${{ needs.configure.outputs.python-version }}
      requirements: ${{ needs.configure.outputs.requirements }}
      provenance: ${{ github.event.inputs.provenance || 'false' }}
    secrets: inherit
