name: Pre-commit

on:
  # push:
  #   branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

jobs:
  pre-commit:
    name: Pre-commit
    uses: stairwaytowonderland/python-reusable-workflows/.github/workflows/pre-commit.yaml@main
    with:
      config: .pre-commit-ci.yaml
    permissions:
      contents: read
      pull-requests: read
